apiVersion: timeline/v1
kind: missions
name: Eclipse
description: >-
  A secret, but routine, weapons test takes the crew to an uninhabited system.
  What could possibly go wrong?
category: ''
tags: []
flightMode: nova
prerequisiteBlocks: []
steps:
  - id: ms-lmibpezx5m
    name: Timeline Initialization
    description: ''
    tags: []
    blocks:
      - event: remoteAccess.send
        multiple: false
        persist: false
        triggerBlocks:
          - id: blo-mc44xtxf4y
            type: ResultPropertyIntoVariable
            property: remoteAccessCodeId
            variable: id
          - id: blo-mc45byle5z
            type: EntityPropertyIntoVariable
            entity: $id
            component: remoteAccessCode
            property: shipId
            variable: ship
          - id: blo-mc45chb53y
            type: EntityPropertyIntoVariable
            entity: $id
            component: remoteAccessCode
            property: code
            variable: code
          - id: blo-mc45d28i2f
            type: IfCondition
            conditions:
              - comparison: '='
                value1: $code
                value2: level5
            triggerBlocks:
              - id: blo-mc45df7m5j
                type: Action
                action: alertLevel.update
                values:
                  alertLevel: '5'
                  shipId: $ship
              - id: blo-mc4txp1y0r
                type: Action
                action: timeline.advance
                values: {}
          - id: blo-mc45dse61b
            type: IfCondition
            conditions:
              - comparison: '='
                value1: $code
                value2: level1
            triggerBlocks:
              - id: blo-mc45e22w32
                type: Action
                action: alertLevel.update
                values:
                  alertLevel: '1'
                  shipId: $ship
              - id: blo-mc4txrxr5p
                type: Action
                action: timeline.advance
                values: {}
        id: blo-mc44xrz145
        type: EventCondition
  - id: ms-llvltmbu5f
    name: Step 1
    description: >-
      Initialize anything that needs to be present at the beginning of this
      timeline.
    tags: []
    blocks:
      - action: waypoints.spawn
        values:
          shipId: '#player'
          entityId: Mars
        id: blo-mc4u1dd66d
        type: Action
      - action: objectives.add
        values:
          shipId: '#player'
          title: Travel
        id: blo-mc4u22t445
        type: Action
  - id: ms-lmj1c5934a
    name: Step 2
    description: ''
    tags: []
    blocks:
      - pluginId: Thorium Default
        macroId: Send Remote Access Code Objective
        id: blo-mcj2aeby1x
        type: Macro
  - id: ms-lmj1eycl47
    name: Step 3
    description: ''
    tags: []
    blocks: []
assets:
  cover: ''
