apiVersion: timeline/v1
kind: reports
name: Mini Exocomp Clean Up
description: Send an exocomp to the relevant room and have it cleanUp the system
category: Exocomps
tags: []
flightMode: nova
assets: {}
prerequisiteBlocks:
  - count: one
    entity: $shipId
    systemType: exocomps
    variable: exocomps
    id: blo-mp5m1ar316
    type: ShipSystemGetter
  - "0":
      conditions:
        - comparison: is not empty
          value1: $exocomps
          value2: ""
        - value1: $damageType
          value2: Contamination
          comparison: "="
      triggerBlocks:
        - id: blo-mp5m1ar409
          type: TimelineAvailability
          isAvailable: true
      id: blo-mp5m1ar52j
      type: IfCondition
autoApplyWhenCompleted: true
steps:
  - id: dr-mp5m1ar60j
    name: Step 1
    description: >-
      Some debris is causing the {systemName} to malfunction. The debris should be removed. Send an
      exocomp to {room} with {parts}. Instruct the exocomp to {action} for
      {duration} seconds.
    tags: []
    blocks:
      - action: exocomps.createExocompAssignment
        values:
          damageReportId: $damageReportId
          requiredPartCount: RANDOM(1,3)
          requiredAction: cleanUp
        id: blo-mp5m1ar74r
        type: Action
      - property: action
        variable: action
        id: blo-mp5m1ar80p
        type: ResultPropertyIntoVariable
      - property: actionDuration
        variable: duration
        id: blo-mp5m1ar90n
        type: ResultPropertyIntoVariable
      - property: assignmentId
        variable: assignmentId
        id: blo-mp5m1ara3o
        type: ResultPropertyIntoVariable
      - property: parts
        variable: parts
        id: blo-mp5m1arb3l
        type: ResultPropertyIntoVariable
      - property: room
        variable: room
        id: blo-mp5m1arc20
        type: ResultPropertyIntoVariable
      - event: damageReports.completeDamageAssignment
        multiple: false
        persist: false
        triggerBlocks:
          - id: blo-mp5m1are47
            type: ResultPropertyIntoVariable
            property: damageAssignmentId
            variable: completedAssignmentId
          - id: blo-mp5m1arf73
            type: IfCondition
            conditions:
              - comparison: "="
                value1: $completedAssignmentId
                value2: $assignmentId
            triggerBlocks:
              - id: blo-mp5m1arg5k
                type: Action
                action: timeline.advance
                values: {}
        id: blo-mp5m1ard2e
        type: EventCondition
