apiVersion: timeline/v1
kind: reports
name: Mini Exocomp Cool
description: Send an exocomp to the relevant room and have it cool the system
category: Exocomps
tags: []
flightMode: nova
assets: {}
prerequisiteBlocks:
  - count: one
    entity: $shipId
    systemType: exocomps
    variable: exocomps
    id: blo-mp5m1aof2d
    type: ShipSystemGetter
  - "0":
      conditions:
        - comparison: is not empty
          value1: $exocomps
          value2: ""
        - value1: $damageType
          value2: Heat
          comparison: "="
      triggerBlocks:
        - id: blo-mp5m1aog40
          type: TimelineAvailability
          isAvailable: true
      id: blo-mp5m1aoh6i
      type: IfCondition
autoApplyWhenCompleted: true
steps:
  - id: dr-mp5m1aoi6i
    name: Step 1
    description: >-
      The {systemName} is severely overheating in localized places. Send an
      exocomp to {room} with {parts}. Instruct the exocomp to {action} for
      {duration} seconds.
    tags: []
    blocks:
      - action: exocomps.createExocompAssignment
        values:
          damageReportId: $damageReportId
          requiredPartCount: RANDOM(1,3)
          requiredAction: cool
        id: blo-mp5m1aoj34
        type: Action
      - property: action
        variable: action
        id: blo-mp5m1aok0s
        type: ResultPropertyIntoVariable
      - property: actionDuration
        variable: duration
        id: blo-mp5m1aol20
        type: ResultPropertyIntoVariable
      - property: assignmentId
        variable: assignmentId
        id: blo-mp5m1aom22
        type: ResultPropertyIntoVariable
      - property: parts
        variable: parts
        id: blo-mp5m1aon4a
        type: ResultPropertyIntoVariable
      - property: room
        variable: room
        id: blo-mp5m1aoo3z
        type: ResultPropertyIntoVariable
      - event: damageReports.completeDamageAssignment
        multiple: false
        persist: false
        triggerBlocks:
          - id: blo-mp5m1aoq3b
            type: ResultPropertyIntoVariable
            property: damageAssignmentId
            variable: completedAssignmentId
          - id: blo-mp5m1aor3l
            type: IfCondition
            conditions:
              - comparison: "="
                value1: $completedAssignmentId
                value2: $assignmentId
            triggerBlocks:
              - id: blo-mp5m1aos0i
                type: Action
                action: timeline.advance
                values: {}
        id: blo-mp5m1aop6i
        type: EventCondition
