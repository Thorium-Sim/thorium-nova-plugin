apiVersion: timeline/v1
kind: reports
name: Mini Exocomp Deionize
description: Send an exocomp to the relevant room and have it deionize the system
category: Exocomps
tags: []
flightMode: nova
assets: {}
prerequisiteBlocks:
  - count: one
    entity: $shipId
    systemType: exocomps
    variable: exocomps
    id: blo-mp5m1aqp6o
    type: ShipSystemGetter
  - "0":
      conditions:
        - comparison: is not empty
          value1: $exocomps
          value2: ""
        - value1: $damageType
          value2: Radiation
          comparison: "="
      triggerBlocks:
        - id: blo-mp5m1aqq1v
          type: TimelineAvailability
          isAvailable: true
      id: blo-mp5m1aqr0o
      type: IfCondition
autoApplyWhenCompleted: true
steps:
  - id: dr-mp5m1aqs08
    name: Step 1
    description: >-
      The {systemName} has been radiated with ionizing radiation. This is causing malfunctions and could pose a danger to crew members. Send an
      exocomp to {room} with {parts}. Instruct the exocomp to {action} for
      {duration} seconds.
    tags: []
    blocks:
      - action: exocomps.createExocompAssignment
        values:
          damageReportId: $damageReportId
          requiredPartCount: RANDOM(1,3)
          requiredAction: deionize
        id: blo-mp5m1aqt46
        type: Action
      - property: action
        variable: action
        id: blo-mp5m1aqu0y
        type: ResultPropertyIntoVariable
      - property: actionDuration
        variable: duration
        id: blo-mp5m1aqv6y
        type: ResultPropertyIntoVariable
      - property: assignmentId
        variable: assignmentId
        id: blo-mp5m1aqw11
        type: ResultPropertyIntoVariable
      - property: parts
        variable: parts
        id: blo-mp5m1aqx2f
        type: ResultPropertyIntoVariable
      - property: room
        variable: room
        id: blo-mp5m1aqy6x
        type: ResultPropertyIntoVariable
      - event: damageReports.completeDamageAssignment
        multiple: false
        persist: false
        triggerBlocks:
          - id: blo-mp5m1ar02o
            type: ResultPropertyIntoVariable
            property: damageAssignmentId
            variable: completedAssignmentId
          - id: blo-mp5m1ar118
            type: IfCondition
            conditions:
              - comparison: "="
                value1: $completedAssignmentId
                value2: $assignmentId
            triggerBlocks:
              - id: blo-mp5m1ar252
                type: Action
                action: timeline.advance
                values: {}
        id: blo-mp5m1aqz61
        type: EventCondition
