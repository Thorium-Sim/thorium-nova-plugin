apiVersion: timeline/v1
kind: reports
name: Mini Exocomp Dismantle
description: Send an exocomp to the relevant room and have it dismantle the system
category: Exocomps
tags: []
flightMode: nova
assets: {}
prerequisiteBlocks:
  - count: one
    entity: $shipId
    systemType: exocomps
    variable: exocomps
    id: blo-mp5m1asn4m
    type: ShipSystemGetter
  - '0':
      conditions:
        - comparison: is not empty
          value1: $exocomps
          value2: ''
        - value1: $damageType
          value2: Structural
          comparison: '='
      triggerBlocks:
        - id: blo-mp5m1aso5m
          type: TimelineAvailability
          isAvailable: true
      id: blo-mp5m1asp4w
      type: IfCondition
    '1':
      conditions:
        - comparison: is not empty
          value1: $exocomps
          value2: ''
        - value1: $damageType
          value2: Fatigue
          comparison: '='
      triggerBlocks:
        - id: blo-mp5m1asq26
          type: TimelineAvailability
          isAvailable: true
      id: blo-mp5m1asr1r
      type: IfCondition
autoApplyWhenCompleted: true
steps:
  - id: dr-mp5m1ass4b
    name: Step 1
    description: >-
      Parts of the {systemName} have lost structural integrity and could suffer
      a catastrophic failure. Send an exocomp to {room} with {parts}. Instruct
      the exocomp to {action} for {duration} seconds. The exocomp will also
      restore the system.
    tags: []
    blocks:
      - action: exocomps.createExocompAssignment
        values:
          damageReportId: $damageReportId
          requiredPartCount: RANDOM(1,3)
          requiredAction: dismantle
        id: blo-mp5m1ast46
        type: Action
      - property: action
        variable: action
        id: blo-mp5m1asu2t
        type: ResultPropertyIntoVariable
      - property: actionDuration
        variable: duration
        id: blo-mp5m1asv4o
        type: ResultPropertyIntoVariable
      - property: assignmentId
        variable: assignmentId
        id: blo-mp5m1asw2b
        type: ResultPropertyIntoVariable
      - property: parts
        variable: parts
        id: blo-mp5m1asx61
        type: ResultPropertyIntoVariable
      - property: room
        variable: room
        id: blo-mp5m1asy72
        type: ResultPropertyIntoVariable
      - event: damageReports.completeDamageAssignment
        multiple: false
        persist: false
        triggerBlocks:
          - id: blo-mp5m1at05a
            type: ResultPropertyIntoVariable
            property: damageAssignmentId
            variable: completedAssignmentId
          - id: blo-mp5m1at132
            type: IfCondition
            conditions:
              - comparison: '='
                value1: $completedAssignmentId
                value2: $assignmentId
            triggerBlocks:
              - id: blo-mp5m1at20c
                type: Action
                action: timeline.advance
                values: {}
        id: blo-mp5m1asz65
        type: EventCondition
