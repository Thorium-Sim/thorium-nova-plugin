apiVersion: timeline/v1
kind: reports
name: Mini Exocomp Energize
description: Send an exocomp to the relevant room and have it energize the system
category: Exocomps
tags: []
flightMode: nova
assets: {}
prerequisiteBlocks:
  - count: one
    entity: $shipId
    systemType: exocomps
    variable: exocomps
    id: blo-mp41qc521v
    type: ShipSystemGetter
  - conditions:
      - comparison: is not empty
        value1: $exocomps
        value2: ''
      - value1: $damageType
        value2: Electrical
        comparison: '='
    triggerBlocks:
      - id: blo-mp41qthn5z
        type: TimelineAvailability
        isAvailable: true
    id: blo-mp41qm4501
    type: IfCondition
autoApplyWhenCompleted: true
steps:
  - id: dr-mp2th12h6t
    name: Step 1
    description: >-
      The {systemName} has lost its charge and needs to be re-energized. Send an
      exocomp to {room} with {parts}. Instruct the exocomp to {action} for
      {duration} seconds.
    tags: []
    blocks:
      - action: exocomps.createExocompAssignment
        values:
          damageReportId: $damageReportId
          requiredPartCount: RANDOM(1,3)
          requiredAction: energize
        id: blo-mp3fze4h0r
        type: Action
      - property: action
        variable: action
        id: blo-mp411ner2w
        type: ResultPropertyIntoVariable
      - property: actionDuration
        variable: duration
        id: blo-mp411v462w
        type: ResultPropertyIntoVariable
      - property: assignmentId
        variable: assignmentId
        id: blo-mp4121q53b
        type: ResultPropertyIntoVariable
      - property: parts
        variable: parts
        id: blo-mp4129mp5s
        type: ResultPropertyIntoVariable
      - property: room
        variable: room
        id: blo-mp412g4c6h
        type: ResultPropertyIntoVariable
      - event: damageReports.completeDamageAssignment
        multiple: false
        persist: false
        triggerBlocks:
          - id: blo-mp41kyjc2y
            type: ResultPropertyIntoVariable
            property: damageAssignmentId
            variable: completedAssignmentId
          - id: blo-mp41l7l13t
            type: IfCondition
            conditions:
              - comparison: '='
                value1: $completedAssignmentId
                value2: $assignmentId
            triggerBlocks:
              - id: blo-mp41liev0g
                type: Action
                action: timeline.advance
                values: {}
        id: blo-mp41efa13c
        type: EventCondition
