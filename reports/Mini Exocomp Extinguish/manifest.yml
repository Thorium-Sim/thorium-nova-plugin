apiVersion: timeline/v1
kind: reports
name: Mini Exocomp Extinguish
description: Send an exocomp to the relevant room and have it extinguish the system
category: Exocomps
tags: []
flightMode: nova
assets: {}
prerequisiteBlocks:
  - count: one
    entity: $shipId
    systemType: exocomps
    variable: exocomps
    id: blo-mp5m1ao12g
    type: ShipSystemGetter
  - "0":
      conditions:
        - comparison: is not empty
          value1: $exocomps
          value2: ""
        - value1: $damageType
          value2: Heat
          comparison: "="
      triggerBlocks:
        - id: blo-mp5m1ao23w
          type: TimelineAvailability
          isAvailable: true
      id: blo-mp5m1ao33w
      type: IfCondition
autoApplyWhenCompleted: true
steps:
  - id: dr-mp5m1ao44t
    name: Step 1
    description: >-
      Fires near the {systemName} are causing damage. Send an
      exocomp to {room} with {parts}. Instruct the exocomp to {action} for
      {duration} seconds.
    tags: []
    blocks:
      - action: exocomps.createExocompAssignment
        values:
          damageReportId: $damageReportId
          requiredPartCount: RANDOM(1,3)
          requiredAction: extinguish
        id: blo-mp5m1ao54d
        type: Action
      - property: action
        variable: action
        id: blo-mp5m1ao65x
        type: ResultPropertyIntoVariable
      - property: actionDuration
        variable: duration
        id: blo-mp5m1ao72p
        type: ResultPropertyIntoVariable
      - property: assignmentId
        variable: assignmentId
        id: blo-mp5m1ao85z
        type: ResultPropertyIntoVariable
      - property: parts
        variable: parts
        id: blo-mp5m1ao90d
        type: ResultPropertyIntoVariable
      - property: room
        variable: room
        id: blo-mp5m1aoa48
        type: ResultPropertyIntoVariable
      - event: damageReports.completeDamageAssignment
        multiple: false
        persist: false
        triggerBlocks:
          - id: blo-mp5m1aoc2q
            type: ResultPropertyIntoVariable
            property: damageAssignmentId
            variable: completedAssignmentId
          - id: blo-mp5m1aod6s
            type: IfCondition
            conditions:
              - comparison: "="
                value1: $completedAssignmentId
                value2: $assignmentId
            triggerBlocks:
              - id: blo-mp5m1aoe24
                type: Action
                action: timeline.advance
                values: {}
        id: blo-mp5m1aob21
        type: EventCondition
