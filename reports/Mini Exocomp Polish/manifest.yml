apiVersion: timeline/v1
kind: reports
name: Mini Exocomp Polish
description: Send an exocomp to the relevant room and have it polish the system
category: Exocomps
tags: []
flightMode: nova
assets: {}
prerequisiteBlocks:
  - count: one
    entity: $shipId
    systemType: exocomps
    variable: exocomps
    id: blo-mp5m1as913
    type: ShipSystemGetter
  - "0":
      conditions:
        - comparison: is not empty
          value1: $exocomps
          value2: ""
        - value1: $damageType
          value2: Fatigue
          comparison: "="
      triggerBlocks:
        - id: blo-mp5m1asa06
          type: TimelineAvailability
          isAvailable: true
      id: blo-mp5m1asb09
      type: IfCondition
autoApplyWhenCompleted: true
steps:
  - id: dr-mp5m1asc6t
    name: Step 1
    description: >-
      The precise tolerances of parts for {systemName} have become worn and need to be refurbished. Send an
      exocomp to {room} with {parts}. Instruct the exocomp to {action} for
      {duration} seconds.
    tags: []
    blocks:
      - action: exocomps.createExocompAssignment
        values:
          damageReportId: $damageReportId
          requiredPartCount: RANDOM(1,3)
          requiredAction: polish
        id: blo-mp5m1asd6m
        type: Action
      - property: action
        variable: action
        id: blo-mp5m1ase2t
        type: ResultPropertyIntoVariable
      - property: actionDuration
        variable: duration
        id: blo-mp5m1asf40
        type: ResultPropertyIntoVariable
      - property: assignmentId
        variable: assignmentId
        id: blo-mp5m1asg5f
        type: ResultPropertyIntoVariable
      - property: parts
        variable: parts
        id: blo-mp5m1ash13
        type: ResultPropertyIntoVariable
      - property: room
        variable: room
        id: blo-mp5m1asi62
        type: ResultPropertyIntoVariable
      - event: damageReports.completeDamageAssignment
        multiple: false
        persist: false
        triggerBlocks:
          - id: blo-mp5m1ask3m
            type: ResultPropertyIntoVariable
            property: damageAssignmentId
            variable: completedAssignmentId
          - id: blo-mp5m1asl1r
            type: IfCondition
            conditions:
              - comparison: "="
                value1: $completedAssignmentId
                value2: $assignmentId
            triggerBlocks:
              - id: blo-mp5m1asm1a
                type: Action
                action: timeline.advance
                values: {}
        id: blo-mp5m1asj2c
        type: EventCondition
