apiVersion: timeline/v1
kind: reports
name: Mini Exocomp Reprogram
description: Send an exocomp to the relevant room and have it reprogram the system
category: Exocomps
tags: []
flightMode: nova
assets: {}
prerequisiteBlocks:
  - count: one
    entity: $shipId
    systemType: exocomps
    variable: exocomps
    id: blo-mp5m1arv2c
    type: ShipSystemGetter
  - "0":
      conditions:
        - comparison: is not empty
          value1: $exocomps
          value2: ""
        - value1: $damageType
          value2: Computer
          comparison: "="
      triggerBlocks:
        - id: blo-mp5m1arw5w
          type: TimelineAvailability
          isAvailable: true
      id: blo-mp5m1arx43
      type: IfCondition
autoApplyWhenCompleted: true
steps:
  - id: dr-mp5m1ary4d
    name: Step 1
    description: >-
      Improvements to the software for the {systemName} have been identified and should be applied. Send an
      exocomp to {room} with {parts}. Instruct the exocomp to {action} for
      {duration} seconds.
    tags: []
    blocks:
      - action: exocomps.createExocompAssignment
        values:
          damageReportId: $damageReportId
          requiredPartCount: RANDOM(1,3)
          requiredAction: reprogram
        id: blo-mp5m1arz2d
        type: Action
      - property: action
        variable: action
        id: blo-mp5m1as06l
        type: ResultPropertyIntoVariable
      - property: actionDuration
        variable: duration
        id: blo-mp5m1as14i
        type: ResultPropertyIntoVariable
      - property: assignmentId
        variable: assignmentId
        id: blo-mp5m1as216
        type: ResultPropertyIntoVariable
      - property: parts
        variable: parts
        id: blo-mp5m1as346
        type: ResultPropertyIntoVariable
      - property: room
        variable: room
        id: blo-mp5m1as463
        type: ResultPropertyIntoVariable
      - event: damageReports.completeDamageAssignment
        multiple: false
        persist: false
        triggerBlocks:
          - id: blo-mp5m1as665
            type: ResultPropertyIntoVariable
            property: damageAssignmentId
            variable: completedAssignmentId
          - id: blo-mp5m1as771
            type: IfCondition
            conditions:
              - comparison: "="
                value1: $completedAssignmentId
                value2: $assignmentId
            triggerBlocks:
              - id: blo-mp5m1as85l
                type: Action
                action: timeline.advance
                values: {}
        id: blo-mp5m1as51p
        type: EventCondition
