apiVersion: timeline/v1
kind: reports
name: Mini Exocomp Warm
description: Send an exocomp to the relevant room and have it warm the system
category: Exocomps
tags: []
flightMode: nova
assets: {}
prerequisiteBlocks:
  - count: one
    entity: $shipId
    systemType: exocomps
    variable: exocomps
    id: blo-mp5m1atl6g
    type: ShipSystemGetter
  - "0":
      conditions:
        - comparison: is not empty
          value1: $exocomps
          value2: ""
        - value1: $damageType
          value2: Cryogenic
          comparison: "="
      triggerBlocks:
        - id: blo-mp5m1atm66
          type: TimelineAvailability
          isAvailable: true
      id: blo-mp5m1atn0o
      type: IfCondition
autoApplyWhenCompleted: true
steps:
  - id: dr-mp5m1ato0l
    name: Step 1
    description: >-
      Sections of the {systemName} have dropped below the safe operating temperature. Send an
      exocomp to {room} with {parts}. Instruct the exocomp to {action} for
      {duration} seconds.
    tags: []
    blocks:
      - action: exocomps.createExocompAssignment
        values:
          damageReportId: $damageReportId
          requiredPartCount: RANDOM(1,3)
          requiredAction: warm
        id: blo-mp5m1atp3k
        type: Action
      - property: action
        variable: action
        id: blo-mp5m1atq2m
        type: ResultPropertyIntoVariable
      - property: actionDuration
        variable: duration
        id: blo-mp5m1atr2e
        type: ResultPropertyIntoVariable
      - property: assignmentId
        variable: assignmentId
        id: blo-mp5m1ats4a
        type: ResultPropertyIntoVariable
      - property: parts
        variable: parts
        id: blo-mp5m1att33
        type: ResultPropertyIntoVariable
      - property: room
        variable: room
        id: blo-mp5m1atu4k
        type: ResultPropertyIntoVariable
      - event: damageReports.completeDamageAssignment
        multiple: false
        persist: false
        triggerBlocks:
          - id: blo-mp5m1atw67
            type: ResultPropertyIntoVariable
            property: damageAssignmentId
            variable: completedAssignmentId
          - id: blo-mp5m1atx3c
            type: IfCondition
            conditions:
              - comparison: "="
                value1: $completedAssignmentId
                value2: $assignmentId
            triggerBlocks:
              - id: blo-mp5m1aty6h
                type: Action
                action: timeline.advance
                values: {}
        id: blo-mp5m1atv39
        type: EventCondition
