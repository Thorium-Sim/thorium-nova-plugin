apiVersion: timeline/v1
kind: trainings
name: Sensors
description: Training for the sensors station, when it has a single sensors card.
category: ''
tags: []
flightMode: nova
assets: {}
prerequisiteBlocks:
  - conditions:
      - comparison: '='
        value1: $station
        value2: Sensors
    triggerBlocks:
      - id: blo-mjhlmfv46e
        type: IfCondition
        conditions:
          - comparison: '='
            value1: $stationComplement
            value2: 4 Small
        triggerBlocks:
          - id: blo-mjhlmmva42
            type: TimelineAvailability
            isAvailable: true
      - id: blo-mjhlmpy94r
        type: IfCondition
        conditions:
          - comparison: '='
            value1: $stationComplement
            value2: 5 Small
        triggerBlocks:
          - id: blo-mjhlmwz63g
            type: TimelineAvailability
            isAvailable: true
    id: blo-mjhlm3vs5v
    type: IfCondition
steps:
  - id: tr-mjhljxlp0h
    name: Step 1 - Welcome
    description: ''
    tags: []
    blocks:
      - action: client.setTraining
        values:
          clientId: $clientId
          station: ''
          text: >-
            Welcome Sensors! It's your job to get information about everything
            around your ship to help your crew make decisions. Let's take a look
            into all the controls you use to do that.
          allowAdvance: true
        id: blo-mjhlp6qz1w
        type: Action
      - action: ship.spawn
        values:
          template:
            pluginId: Thorium Default
            name: Astra Frigate
          entityId: $shipId
          distance: 15000
          tags:
            - html
        id: blo-mjoep3683b
        type: Action
      - property: id
        variable: id
        id: blo-mjoephl46l
        type: ResultPropertyIntoVariable
      - action: thorium.setEntityComponent
        values:
          entityId: $id
          components:
            - component: identity
              property: name
              comparison: ''
              value: Target Ship
        id: blo-mjoepquj0n
        type: Action
      - entity: this timeline
        variable: contactId
        value: $id
        id: blo-mplrrjm00r
        type: SetVariable
  - id: ts-mjnaxljy15
    name: Step 2 - Login
    description: ''
    tags: []
    blocks:
      - entity: $clientId
        component: flightClient
        property: loginName
        variable: loginName
        id: blo-mjnb8i6y3o
        type: EntityPropertyIntoVariable
      - debugVariable: ''
        id: blo-mqmcebjq26
        type: Debug
      - conditions:
          - comparison: is not empty
            value1: $loginName
            value2: ''
        triggerBlocks:
          - id: blo-mjnbgxxz6t
            type: Action
            action: timeline.advance
            values: {}
        id: blo-mjnb8svo27
        type: IfCondition
      - conditions:
          - comparison: is empty
            value1: $loginName
            value2: ''
        triggerBlocks:
          - id: blo-mjnbhdn32e
            type: Action
            action: client.setTraining
            values:
              clientId: $clientId
              text: >-
                The first thing you need to do is identify yourself by entering
                your name and logging in. Do that now.
              selector:
                - .login-form
          - id: blo-mjng261d0u
            type: EventCondition
            event: client.login
            multiple: true
            persist: false
            triggerBlocks:
              - id: blo-mjng4er92w
                type: ResultPropertyIntoVariable
                property: clientId
                variable: loginClientId
              - id: blo-mjng4s9g2h
                type: IfCondition
                conditions:
                  - comparison: '='
                    value1: $loginClientId
                    value2: $clientId
                triggerBlocks:
                  - id: blo-mjng4zol66
                    type: Action
                    action: timeline.advance
                    values: {}
        id: blo-mjnbh6hs62
        type: IfCondition
  - id: ts-mjnbk6re4b
    name: Step 3 - Sensors Summary
    description: ''
    tags: []
    blocks:
      - action: client.setTraining
        values:
          clientId: $clientId
          text: >-
            This is the screen you'll use to see everything around your ship,
            perform sensor scans, and see processed data.
          allowAdvance: true
        id: blo-mjnbk9pj6z
        type: Action
  - id: ts-mjnffi5646
    name: Step 4 - Radar
    description: ''
    tags: []
    blocks:
      - action: client.setTraining
        values:
          clientId: $clientId
          station: ''
          text: >-
            This is your sensors radar. It shows the relative direction and
            distance from your ship to nearby objects in 3D space.


            Your ship is in the very center, with the arrow pointing in the same
            direction as your ship. As your ship turns and rotates, you'll see
            the objects in this radar move with your ship.


            It is **crucial** to remember that you are seeing a 2D projection of
            3D space. Objects might be above or below your ship. Go to the next
            step to find out how to see what objects are above or below you.
          selector:
            - .sensors-radar
          allowAdvance: true
        id: blo-mjnffl9l4q
        type: Action
  - id: ms-mjnfrr9c3p
    name: Step 5 - Radar Controls
    description: ''
    tags: []
    blocks:
      - id: blo-mjnfrr9b46
        type: Action
        action: client.setTraining
        values:
          clientId: $clientId
          text: >-
            You can use this slider to zoom in and out to better see the
            movement of ships. Give it a go now - see if you can zoom out all
            the way.
          selector:
            - .sensors-slider
      - event: thorium.genericEvent
        multiple: true
        persist: false
        triggerBlocks:
          - id: blo-mjngpqbo60
            type: ResultPropertyIntoVariable
            property: clientId
            variable: eventClientId
          - id: blo-mjngpynz17
            type: ResultPropertyIntoVariable
            property: eventName
            variable: eventName
          - id: blo-mjngq56b0i
            type: ResultPropertyIntoVariable
            property: properties
            variable: zoom
          - id: blo-mjngqbnj6c
            type: IfCondition
            conditions:
              - comparison: '='
                value1: $eventClientId
                value2: $clientId
              - value1: $eventName
                value2: radar-zoom
                comparison: '='
              - value1: $zoom
                value2: '0.2'
                comparison: <=
            triggerBlocks:
              - id: blo-mjngtebd27
                type: Action
                action: timeline.advance
                values: {}
        id: blo-mjngpdow5i
        type: EventCondition
  - id: ms-mjngvme84g
    name: Step 6 - Tilt Control
    description: ''
    tags: []
    blocks:
      - id: blo-mjngvme71y
        type: Action
        action: client.setTraining
        values:
          clientId: $clientId
          text: >-
            Excellent work. You can also tilt the radar to give you a 3D view of
            space. There are three levels of tilt: directly above, 45˚ behind,
            and 90˚ behind. At the 90˚ tilt, your ship appears to move _into_
            the the radar, while up and down correspond to above and below your
            ship.


            Go ahead and switch the tilt to 90˚ behind by clicking the tilt
            button twice.
          selector:
            - .sensors-tilt
      - pluginId: Thorium Default
        macroId: Handle Generic Event
        triggerBlocks:
          - id: blo-mjnh42oy5c
            type: IfCondition
            conditions:
              - comparison: '='
                value1: $eventName
                value2: radar-tilt
              - value1: $eventClientId
                value2: $clientId
                comparison: '='
              - value1: $props
                value2: '1'
                comparison: '='
            triggerBlocks:
              - id: blo-mjnh5adt5b
                type: Action
                action: timeline.advance
                values: {}
        id: blo-mjnh3y5q4e
        type: Macro
  - id: ts-mqmdjzvt25
    name: Step 7 - Tilt Back
    tags: []
    description: ''
    blocks:
      - action: client.setTraining
        values:
          shipId: $shipId
          station: $station
          clientId: $clientId
          text: >-
            Perfect. You can use the zoom and tilt to get a better view at the
            contacts, whether they are above or below you, close to you or far
            away.
          allowAdvance: true
        id: blo-mqmdk8zj2y
        type: Action
  - id: ts-mqn4mlvy0d
    name: Step 8 - Contacts
    tags: []
    description: ''
    blocks:
      - action: client.setTraining
        values:
          shipId: $shipId
          station: $station
          clientId: $clientId
          selector:
            - .sensors-radar
          text: >-
            Let's take a closer look at your sensors radar. Your station has the
            longest radar range, allowing you to see objects incredibly far
            away. There are already a few contacts visible on the radar. If you
            can't see all of them, zoom in and out.


            The triangle contact represents a ship or object that you haven't
            identified yet. You'll discover what that contact is in a few
            moments.


            The circles are planets or moons. You can see they have a large dark
            triangle behind them. This area is blocked by the planet — ships and
            objects behind the planet can't be seen by your sensors. Likewise,
            if you are behind the planet, ships on the other side won't be able
            to see you. Use this to your strategic advantage.
          allowAdvance: true
        id: blo-mqn4msfj56
        type: Action
      - action: effects.sendClientEvent
        values:
          clientId: $clientId
          name: radarTiltEvent
          payload: '0'
        id: blo-mqn57xt43j
        type: Action
  - id: ts-mqn4pkjl0d
    name: Step 9 - Contacts List
    tags: []
    description: ''
    blocks:
      - action: client.setTraining
        values:
          shipId: $shipId
          station: $station
          clientId: $clientId
          text: >-
            Any contacts that are visible in your sensor range will appear in
            this list, which makes it easier to know what's around you. Pay
            attention to when objects join this list, since it means there's
            something new approaching your ship.


            You can select the contacts by choosing them from this list, or
            clicking on them in the sensors array. Click on the Unknown contact
            in the list to select it.
          selector:
            - .objects-list
          allowAdvance: false
        id: blo-mqn4pmzb54
        type: Action
      - entity: this timeline
        getVariable: contactId
        variable: contactId
        id: blo-mqn4zxj55m
        type: VariableIntoVariable
      - event: sensors.selectContact
        multiple: true
        persist: false
        triggerBlocks:
          - id: blo-mqn50dg231
            type: ResultPropertyIntoVariable
            property: shipId
            variable: eventShipId
          - id: blo-mqn50dg301
            type: ResultPropertyIntoVariable
            property: contactId
            variable: eventContactId
          - id: blo-mqn50dg40t
            type: IfCondition
            conditions:
              - value1: $eventShipId
                value2: $shipId
                comparison: '='
              - value1: $eventContactId
                value2: $contactId
                comparison: '='
            triggerBlocks:
              - id: blo-mqn50n8n0c
                type: Action
                action: timeline.advance
                values: {}
        id: blo-mqn50dg52a
        type: EventCondition
  - id: ts-mqn539co4q
    name: Step 10 - Identification Scan
    tags: []
    description: ''
    blocks:
      - action: client.setTraining
        values:
          shipId: $shipId
          station: $station
          clientId: $clientId
          text: >-
            This shows you what you know about the contact based on your scans.
            At this point, you don't know anything, because you haven't scanned
            this ship yet.


            Let's find out who this ship is. Initiate an identity scan on the
            ship to find out its name.
          selector:
            - .scan-options
        id: blo-mqn53cl760
        type: Action
      - event: sensors.scanStart
        multiple: true
        persist: false
        triggerBlocks:
          - id: blo-mqn54ro12t
            type: ResultPropertyIntoVariable
            property: shipId
            variable: eventShipId
          - id: blo-mqn54ro26o
            type: ResultPropertyIntoVariable
            property: type
            variable: eventType
          - id: blo-mqn54ro31v
            type: ResultPropertyIntoVariable
            property: target
            variable: eventTarget
          - id: blo-mqn54ro501
            type: IfCondition
            conditions:
              - value1: $eventShipId
                value2: $shipId
                comparison: '='
              - value1: $eventType
                value2: identification
                comparison: '='
              - value1: $eventTarget
                value2: $contactId
                comparison: '='
            triggerBlocks:
              - id: blo-mqn551jh4o
                type: Action
                action: timeline.advance
                values: {}
        id: blo-mqn54ro45d
        type: EventCondition
  - id: ts-mqpn4chz0x
    name: Step 11 - Scan Progress
    tags: []
    description: ''
    blocks:
      - action: client.setTraining
        values:
          shipId: $shipId
          station: $station
          clientId: $clientId
          text: >-
            You'll see the scan progress here, and then the scan results when
            the scan is complete.


            Before we look at the results, there are a few things you should
            know about how scans work.


            First, scans provide a snapshot of the ship you scanned. Once the
            scan is complete, things about the scan might change, requiring you
            to perform another scan to keep your scan results up-to-date. You
            can always see the most recent scan result when you select the
            object.


            Second, scans will always pull the maximum possible power to
            complete as quickly as possible. If you have more than one active
            scan, the power will be split evenly between them and the scan
            results will take longer. Keep that in mind as you are running your
            scans.


            Third, if a scan target has its shields raised, it will take more
            effort to complete the scan, making the scan take longer.
          selector:
            - .scans-panel
          allowAdvance: true
        id: blo-mqpn4f0j0u
        type: Action
  - id: ts-mqpnmn6d3y
    name: Step 12 - Scan Range
    tags: []
    description: ''
    blocks:
      - action: effects.sendClientEvent
        values:
          name: radarZoomEvent
          clientId: $clientId
          payload: '0.0024634853181741997'
        id: blo-mqpnnfra29
        type: Action
      - action: client.setTraining
        values:
          shipId: $shipId
          station: $station
          clientId: $clientId
          selector:
            - .sensors-radar
          text: >-
            Finally, the distance between your ship and a contact will affect
            how fast scan results come in. The thin blue line on your radar
            represents your scan range. You can still scan contacts outside of
            that range, but it will take significantly longer than for contacts
            within that range. The closer a contact is, the faster your scans
            will complete.
          allowAdvance: true
        id: blo-mqpnohzc59
        type: Action
  - id: ms-mqpo9l5k0a
    name: Step 13 - Scan Results
    description: ''
    tags: []
    blocks:
      - id: blo-mqpo9l5j4d
        type: Action
        action: client.setTraining
        values:
          clientId: $clientId
          card: ''
          selector:
            - .scans-panel
          text: >-
            Now, let's take a look at what we discovered. We've learned the name
            of the ship, its ship classification, and what faction it
            represents, which is useful to know if the ship is friendly or not.
            Note that the ship's icon has also changed in the radar, making it
            easier to identify the ship.
          allowAdvance: true
  - id: ts-mqpofes96m
    name: Step 14 - Scan Options
    tags: []
    description: ''
    blocks:
      - action: client.setTraining
        values:
          shipId: $shipId
          station: $station
          clientId: $clientId
          text: >-
            There are many other types of scans you can perform on the target:


            **Crew:** How many personnel are present.

            **Cargo:** What notable cargo is present.

            **Shields:** The status and strength of shields.

            **Weapons:** What weapons are present and loaded.

            **Engines:** The forward and rotation speed of the ship.

            **Targeting:** The current weapons target.

            **Damage:** What systems have sustained damage.

            **Communications:** The current antenna frequency and whether comms
            are active.

            **Life Support:** Oxygen, temperature, and other life-sustaining
            properties.


            Planets and moons have other properties you can scan for as well.
          allowAdvance: true
        id: blo-mqpofhs21d
        type: Action
  - id: ts-mqpop3204k
    name: Step 15 - Good Scanning Practice
    tags: []
    description: ''
    blocks:
      - action: client.setTraining
        values:
          shipId: $shipId
          station: $station
          clientId: $clientId
          text: >-
            When should you scan ships, and what kinds of scans should you
            perform? It depends on the situation, but typically you want to
            follow these guidelines:


            - Start by scanning for identification.

            - If it's a friendly ship, only conduct further scans if you have a
            specific reason.

            - For unknown or enemy ships, create a threat profile by scanning
            weapons, shields, engines, and targeting.

            - If you want to communicate with the ship, scan communications to
            know what frequency to tune your antenna to.

            - If the ship seems to be in trouble, scan for damage or life
            support to know how bad the situation is.

            - If you're attempting to find contraband or illegal cargo, a cargo
            scan should reveal anything suspicious.
          allowAdvance: true
        id: blo-mqpop80p2i
        type: Action
  - id: ts-mqpotgqx3j
    name: Step 16 - Processed Data
    tags: []
    description: ''
    blocks:
      - action: client.setTraining
        values:
          shipId: $shipId
          station: $station
          clientId: $clientId
          selector:
            - .processed-data
          allowAdvance: true
          text: >-
            Active scans can only take you so far. From time to time, the ship's
            computer will automatically detect anomalies in the sensor grid and
            deliver that information to you here. It is incredibly important
            that you read anything that appears in this box aloud, so your crew
            can hear it. Some of the information might be pertinent to their
            station.
        id: blo-mqpou1zn4q
        type: Action
      - action: sensors.sendProcessedData
        values:
          shipId: $shipId
          data: >-
            This is where processed data will appear. You are nearing the end of
            your training.
        id: blo-mqpp06in2d
        type: Action
  - id: ms-mk1zllmy2w
    name: Step 26 - Officers Log Widget
    description: ''
    tags: []
    blocks:
      - id: blo-mk1zllmx28
        type: Action
        action: client.setTraining
        values:
          clientId: $clientId
          text: >-
            There are a few extra things unrelated to the Sensors station. The
            first is your officers log, which you can open by clicking this
            button. Feel free to use it to write down notes, ideas, or thoughts
            during the mission.
          allowAdvance: true
          selector:
            - .widget-OfficersLog
  - id: ms-mk1zpl9n4h
    name: Step 27 - Objectives Widget
    description: ''
    tags: []
    blocks:
      - id: blo-mk1zpl9m6k
        type: Action
        action: client.setTraining
        values:
          clientId: $clientId
          selector:
            - .widget-Objectives
          text: >-
            This will show you your ships current objectives, which can be
            helpful to know what your team needs to do next.
          allowAdvance: true
  - id: ms-mk1zqlko4i
    name: Step 28 - Settings Widget
    description: ''
    tags: []
    blocks:
      - id: blo-mk1zqlkn2q
        type: Action
        action: client.setTraining
        values:
          clientId: $clientId
          allowAdvance: true
          selector:
            - .widget-Settings
          text: >-
            Finally, this is the settings for your station, where you can
            configure audio volume levels and gamepads which you can use to
            control your station.
  - id: ms-mk1zx1jx3e
    name: Step 29 - Done
    description: ''
    tags: []
    blocks:
      - id: blo-mk1zx1jw3z
        type: Action
        action: client.setTraining
        values:
          clientId: $clientId
          text: >-
            In summary, keep an eye on the radar, let your crew know if
            something unusual appears, announce the processed data, and perform
            scans to better understand the space around your ship.


            That concludes your training. If you don't feel confident, feel free
            to play around with your controls further until you've mastered your
            radar and scanning.


            Good luck!
          allowAdvance: true
          card: ''
